<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart City - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 font-sans">

    <nav class="bg-slate-800 border-b border-slate-700 p-6 shadow-2xl">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-extrabold tracking-tight text-blue-400">
                <i class="fa-solid fa-city mr-2"></i>SMART<span class="text-white">CITY</span>
            </h1>
            <div class="flex items-center gap-4">
                <span class="flex h-3 w-3 rounded-full bg-green-500"></span>
                <p class="text-sm font-medium uppercase tracking-widest">Servidor Ativo</p>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-12 p-4">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-bold">Monitoramento de Dispositivos</h2>
            <button onclick="buscarSensores()" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-lg font-bold transition-all shadow-lg shadow-blue-900/20">
                <i class="fa-solid fa-rotate mr-2"></i>Atualizar
            </button>
        </div>
        
        <div id="cards-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
            <p class="text-center col-span-full text-slate-400 animate-pulse">Buscando sensores no banco de dados...</p>
        </div>
    </main>

    <script>
        const icones = {
            'temperatura': 'fa-thermometer-half',
            'umidade': 'fa-droplet',
            'luminosidade': 'fa-sun',
            'contador': 'fa-arrow-up-9-1'
        };

        async function buscarSensores() {
            try {
                const response = await fetch('http://127.0.0.1:8000/api/sensores/');
                const sensores = await response.json();
                
                const container = document.getElementById('cards-container');
                container.innerHTML = ''; 

                sensores.forEach(sensor => {
                    const icone = icones[sensor.tipo.toLowerCase()] || 'fa-microchip';
                    
                    container.innerHTML += `
                        <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 hover:border-blue-500 transition-all duration-300 shadow-xl group">
                            <div class="flex justify-between items-start mb-4">
                                <div class="p-3 bg-slate-700 rounded-xl group-hover:bg-blue-600 transition-colors">
                                    <i class="fa-solid ${icone} text-2xl text-blue-400 group-hover:text-white"></i>
                                </div>
                                <span class="text-[10px] font-bold uppercase tracking-tighter text-slate-500">ID: ${sensor.id}</span>
                            </div>
                            
                            <h3 class="text-lg font-bold capitalize mb-1">${sensor.tipo}</h3>
                            <p class="text-sm text-slate-400 mb-4">${sensor.localizacao}</p>
                            
                            <div class="pt-4 border-t border-slate-700 flex justify-between items-center">
                                <div class="text-xs text-slate-500 font-mono">${sensor.mac_address}</div>
                                <div class="h-2 w-2 rounded-full ${sensor.status_operacional ? 'bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]' : 'bg-red-500'}"></div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                document.getElementById('cards-container').innerHTML = `
                    <div class="col-span-full bg-red-900/20 border border-red-500/50 text-red-200 p-4 rounded-xl text-center">
                        Erro ao conectar com a API. O servidor Django está ligado?
                    </div>
                `;
            }
        }

        buscarSensores();
    </script>
</body>
</html>
